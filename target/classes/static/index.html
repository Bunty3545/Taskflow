<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>TaskFlow</h1>
            <p>Organize your work effectively</p>
        </header>

        <section class="task-form-section">
            <h2>Add New Task</h2>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label for="title">Task Title</label>
                    <input type="text" id="title" placeholder="Enter task title" required>
                </div>
                <div class="form-group">
                    <label for="description">Task Description</label>
                    <textarea id="description" placeholder="Enter task description" required></textarea>
                </div>
                <button type="submit" id="submitBtn">Add Task</button>
                <button type="button" id="cancelBtn" class="cancel-btn" style="display: none;">Cancel Edit</button>
            </form>
        </section>

        <section class="task-list-section">
            <h2>Your Tasks</h2>
            <div id="taskList" class="task-list">
                <!-- Tasks will be populated here by JavaScript -->
                <div class="loading">Loading tasks...</div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
